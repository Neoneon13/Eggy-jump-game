<!DOCTYPE html>
<html>
<head>
<title>Eggy Jump - Ultra Edition</title>

<style>

body{
font-family:Arial;
text-align:center;
background:linear-gradient(#87CEEB,#ffffff);
overflow-x:hidden;
}

#gameArea{
position:relative;
height:180px;
margin-bottom:10px;
}

#egg{
font-size:90px;
transition:transform 0.2s;
position:relative;
z-index:2;
}

.jump{
transform:translateY(-45px);
}

#trampoline{
font-size:70px;
position:absolute;
bottom:0;
left:50%;
transform:translateX(-50%);
transition:transform 0.15s;
}

.bounce{
transform:translateX(-50%) scaleY(0.75);
}

button{
padding:10px 20px;
margin:5px;
font-size:16px;
cursor:pointer;
}

.panel{
margin:15px;
}

.floating{
position:absolute;
font-weight:bold;
animation:floatUp 1s forwards;
}

@keyframes floatUp{
0%{opacity:1; transform:translateY(0);}
100%{opacity:0; transform:translateY(-60px);}
}

</style>

</head>

<body>

<h1>🥚 Eggy Jump</h1>

<div id="gameArea">
<div id="egg">🥚</div>
<div id="trampoline">🛏️</div>
</div>

<h2>Points: <span id="points">0</span></h2>
<h3>Points Per Jump: <span id="ppj">1</span></h3>
<h3>Total Jumps: <span id="jumps">0</span></h3>

<button onclick="jump()">JUMP</button>

<div class="panel">

<h2>🪂 Upgrades</h2>

<button onclick="buyTrampoline()">
Upgrade Jump Power  
Cost: <span id="trampolineCost">25</span>
</button>

<button onclick="buyEgg()">
Upgrade Egg Strength  
Cost: <span id="eggCost">50</span>
</button>

</div>

<div class="panel">

<h2>⚡ Automation</h2>

<button onclick="buyAuto()">
Buy Auto Jumper  
Cost: <span id="autoCost">500</span>
</button>

<p>Auto Jumpers: <span id="autoCount">0</span></p>

</div>

<div class="panel">
<h2>🏆 Achievements</h2>
<ul id="achievements"></ul>
</div>

<script>

let points = 0
let totalJumps = 0

let trampolineLevel = 1
let eggLevel = 0

let trampolineCost = 25
let eggCost = 50

let autoJumpers = 0
let autoCost = 500

let achievements = {
firstJump:false,
hundredPoints:false,
thousandPoints:false,
hundredJumps:false
}

function pointsPerJump(){
return trampolineLevel + eggLevel
}

function update(){

document.getElementById("points").innerText = Math.floor(points)
document.getElementById("ppj").innerText = pointsPerJump()
document.getElementById("jumps").innerText = totalJumps

document.getElementById("trampolineCost").innerText = trampolineCost
document.getElementById("eggCost").innerText = eggCost

document.getElementById("autoCost").innerText = autoCost
document.getElementById("autoCount").innerText = autoJumpers

updateAchievements()

}

function jump(){

let gain = pointsPerJump()

if(Math.random() < 0.1){
gain *= 5
}

points += gain
totalJumps++

let egg = document.getElementById("egg")
let bed = document.getElementById("trampoline")

egg.classList.add("jump")

setTimeout(()=>{
egg.classList.remove("jump")

bed.classList.add("bounce")

setTimeout(()=>{
bed.classList.remove("bounce")
},150)

},200)

showFloating(gain)

update()

}

function showFloating(amount){

let float = document.createElement("div")

float.innerText = "+" + amount
float.className = "floating"

float.style.left = (window.innerWidth/2 + Math.random()*60-30)+"px"
float.style.top = "200px"

document.body.appendChild(float)

setTimeout(()=>{
float.remove()
},1000)

}

function buyTrampoline(){

if(points >= trampolineCost){

points -= trampolineCost
trampolineLevel++

trampolineCost = Math.floor(trampolineCost * 2)

update()

}

}

function buyEgg(){

if(points >= eggCost){

points -= eggCost
eggLevel++

eggCost = Math.floor(eggCost * 2)

update()

}

}

function buyAuto(){

if(points >= autoCost){

points -= autoCost
autoJumpers++

autoCost = Math.floor(autoCost * 2)

update()

}

}

setInterval(()=>{

points += autoJumpers * pointsPerJump()

update()

},1000)

function updateAchievements(){

let list = document.getElementById("achievements")

list.innerHTML=""

if(totalJumps>=1) achievements.firstJump=true
if(points>=100) achievements.hundredPoints=true
if(points>=1000) achievements.thousandPoints=true
if(totalJumps>=100) achievements.hundredJumps=true

if(achievements.firstJump) list.innerHTML+="<li>First Jump</li>"
if(achievements.hundredPoints) list.innerHTML+="<li>100 Points</li>"
if(achievements.thousandPoints) list.innerHTML+="<li>1000 Points</li>"
if(achievements.hundredJumps) list.innerHTML+="<li>100 Jumps</li>"

}

function save(){

localStorage.setItem("eggyJumpSave", JSON.stringify({
points,
totalJumps,
trampolineLevel,
eggLevel,
trampolineCost,
eggCost,
autoJumpers,
autoCost,
achievements
}))

}

function load(){

let data = JSON.parse(localStorage.getItem("eggyJumpSave"))

if(data){

points=data.points
totalJumps=data.totalJumps
trampolineLevel=data.trampolineLevel
eggLevel=data.eggLevel
trampolineCost=data.trampolineCost
eggCost=data.eggCost
autoJumpers=data.autoJumpers
autoCost=data.autoCost
achievements=data.achievements

}

}

setInterval(save,5000)

load()
update()

</script>

</body>
