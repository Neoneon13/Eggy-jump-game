<!DOCTYPE html>
<html>
<head>
<title>Eggy Jump</title>

<style>

body{
font-family:Arial;
text-align:center;
background:linear-gradient(#87CEEB,#ffffff);
}

#gameArea{
position:relative;
height:170px;
margin-bottom:10px;
}

#egg{
font-size:90px;
transition:transform 0.2s;
position:relative;
z-index:2;
}

.jump{
transform:translateY(-40px);
}

#trampoline{
font-size:70px;
position:absolute;
bottom:0;
left:50%;
transform:translateX(-50%);
}

button{
padding:10px 20px;
margin:5px;
font-size:16px;
cursor:pointer;
}

.panel{
margin:15px;
}

</style>

</head>

<body>

<h1>🥚 Eggy Jump</h1>

<div id="gameArea">
<div id="egg">🥚</div>
<div id="trampoline">🪂</div>
</div>

<h2>Points: <span id="points">0</span></h2>
<h3>Points Per Jump: <span id="ppj">1</span></h3>

<button onclick="jump()">JUMP</button>

<div class="panel">

<h2>🪂 Trampolines</h2>

<button onclick="buyTrampoline()">
Upgrade Trampoline  
Cost: <span id="trampolineCost">25</span>
</button>

</div>

<div class="panel">

<h2>🥚 Eggs</h2>

<button onclick="buyEgg()">
Upgrade Egg  
Cost: <span id="eggCost">50</span>
</button>

</div>

<div class="panel">

<h2>⚡ Automation</h2>

<button onclick="buyAuto()">
Buy Auto Jumper  
Cost: <span id="autoCost">500</span>
</button>

</div>

<div class="panel">
<h3>Auto Jumpers: <span id="autoCount">0</span></h3>
</div>

<script>

let points = 0
let trampolineLevel = 1
let eggLevel = 0

let trampolineCost = 25
let eggCost = 50

let autoJumpers = 0
let autoCost = 500

function pointsPerJump(){
return trampolineLevel + eggLevel
}

function update(){

document.getElementById("points").innerText = Math.floor(points)
document.getElementById("ppj").innerText = pointsPerJump()

document.getElementById("trampolineCost").innerText = trampolineCost
document.getElementById("eggCost").innerText = eggCost

document.getElementById("autoCost").innerText = autoCost
document.getElementById("autoCount").innerText = autoJumpers

}

function jump(){

points += pointsPerJump()

let egg = document.getElementById("egg")

egg.classList.add("jump")

setTimeout(()=>{
egg.classList.remove("jump")
},200)

update()

}

function buyTrampoline(){

if(points >= trampolineCost){

points -= trampolineCost
trampolineLevel++

trampolineCost = Math.floor(trampolineCost * 2)

update()

}

}

function buyEgg(){

if(points >= eggCost){

points -= eggCost
eggLevel++

eggCost = Math.floor(eggCost * 2)

update()

}

}

function buyAuto(){

if(points >= autoCost){

points -= autoCost
autoJumpers++

autoCost = Math.floor(autoCost * 2)

update()

}

}

setInterval(()=>{

points += autoJumpers * pointsPerJump()

update()

},1000)

function save(){

localStorage.setItem("eggyJumpSave", JSON.stringify({
points,
trampolineLevel,
eggLevel,
trampolineCost,
eggCost,
autoJumpers,
autoCost
}))

}

function load(){

let saveData = JSON.parse(localStorage.getItem("eggyJumpSave"))

if(saveData){

points = saveData.points
trampolineLevel = saveData.trampolineLevel
eggLevel = saveData.eggLevel
trampolineCost = saveData.trampolineCost
eggCost = saveData.eggCost
autoJumpers = saveData.autoJumpers
autoCost = saveData.autoCost

}

}

setInterval(save,5000)

load()
update()

</script>

</body>
</html>
